<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Claude Mirror</title>

<style>

body{
font-family: Arial;
background:#f0f0f0;
padding:40px;
}

#chat{
max-width:700px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
}

textarea{
width:100%;
height:80px;
}

button{
padding:10px 20px;
margin-top:10px;
}

.message{
margin:10px 0;
}

.user{
color:blue;
}

.bot{
color:green;
}

</style>

</head>

<body>

<div id="chat">

<h2>Claude Chat</h2>

<div id="messages"></div>

<textarea id="input"></textarea>

<button onclick="send()">Send</button>

</div>

<script>

async function send(){

const input=document.getElementById("input");
const text=input.value;

add("user",text);

input.value="";

const res=await fetch("/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
message:text
})

});

const data=await res.json();

add("bot",data.reply);

}

function add(role,text){

const div=document.createElement("div");

div.className="message "+role;

div.innerText=(role==="user"?"You: ":"Claude: ")+text;

document.getElementById("messages").appendChild(div);

}

</script>

</body>
</html>
